# Grafana credentials via Infisical
# This will sync secrets from Infisical to Kubernetes
# Configure in Infisical:
#   - project: monitoring
#   - environment: production  
#   - secret path: /grafana
#   - keys: admin-password

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: grafana-credentials
  namespace: monitoring
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_PROJECT_ID
  env: production
  secretPath: /grafana
  secretReloadPolicy: Always
