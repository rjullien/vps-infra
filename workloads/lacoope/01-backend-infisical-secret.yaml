# LaCoope backend secrets from Infisical
# Configure in Infisical:
#   - project: lacoope
#   - environment: production
#   - secret path: /backend
#   - keys: postgres-password, session-key, admin-email, admin-password-hash, garage-access-key, garage-secret-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: lacoope-backend-secrets
  namespace: default
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_LACOOPE_PROJECT_ID
  env: production
  secretPath: /backend
  secretReloadPolicy: Always
