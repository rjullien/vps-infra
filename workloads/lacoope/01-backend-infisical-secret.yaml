# LaCoope backend secrets from Infisical
# Configure in Infisical:
#   - project: lacoope
#   - environment: production
#   - secret path: /backend
#   - keys: postgres-password, session-key, admin-email, admin-password-hash, garage-access-key, garage-secret-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: lacoope-backend-secrets
  namespace: default
spec:
  hostAPI: https://infisical.bapttf.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectId: REPLACE_WITH_LACOOPE_PROJECT_ID
        envSlug: production
        secretsPath: /backend
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: lacoope-backend-secrets
      secretNamespace: default
      creationPolicy: Owner
