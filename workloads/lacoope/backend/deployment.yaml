apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacoope-backend
  namespace: lacoope
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lacoope-backend
  template:
    metadata:
      labels:
        app: lacoope-backend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: backend
          image: ghcr.io/bapttf/lacoopebackend:0.2.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: lacoope-backend-secret
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: PORT
              value: "8080"
            - name: FRONTEND_URL
              value: "https://lacoope.bapttf.com"
            - name: DB_HOST
              value: "postgres-cluster-rw.cnpg-system.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "lacoope"
            - name: POSTGRES_USER
              value: "lacoope"
            - name: IMAGE_MAX_WIDTH
              value: "1920"
            - name: IMAGE_MAX_HEIGHT
              value: "1080"
            - name: IMAGE_JPEG_QUALITY
              value: "75"
            - name: IMAGE_MAX_SIZE
              value: "10485760"
            - name: S3_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"
            - name: S3_BUCKET
              value: "lacoope-images"
            - name: S3_REGION
              value: "us-east-1"
            - name: S3_PUBLIC_URL
              value: "https://s3.bapttf.com/lacoope-images"
            - name: S3_ACCESS_KEY
              value: "backend-app"
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: backendAppSecret
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
