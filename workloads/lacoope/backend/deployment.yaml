apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacoope-backend
  namespace: lacoope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lacoope-backend
  template:
    metadata:
      labels:
        app: lacoope-backend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: backend
          image: ghcr.io/bapttf/lacoopebackend:0.1.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: lacoope-backend-secret
          env:
            - name: ECHO_ENV
              value: "production"
            - name: SERVER_PORT
              value: "8080"
            - name: FRONTEND_URL
              value: "https://lacoope.bapttf.com"
            - name: DB_HOST
              value: "postgres-cluster-rw.cnpg-system.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "lacoope"
            - name: POSTGRES_USER
              value: "lacoope"
            - name: IMAGE_MAX_WIDTH
              value: "1920"
            - name: IMAGE_MAX_HEIGHT
              value: "1080"
            - name: IMAGE_JPEG_QUALITY
              value: "75"
            - name: IMAGE_MAX_SIZE
              value: "10485760"
            - name: GARAGE_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"
            - name: GARAGE_BUCKET
              value: "lacoope-images"
            - name: GARAGE_REGION
              value: "us-east-1"
            - name: GARAGE_WEB_ENDPOINT
              value: "https://s3.bapttf.com/lacoope-images"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
