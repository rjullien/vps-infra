apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-ssh
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
    storage: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: default
spec:
  ports:
  - name: http
    port: 18789
    targetPort: 18789
  - name: ssh
    port: 22
    targetPort: 22
    nodePort: 22222
  selector:
    app: openclaw
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
      - name: openclaw
        image: ghcr.io/bapttf/openclaw-lea-config:latest
        ports:
        - containerPort: 18789
          name: http
        env:
        - name: OPENCLAW_SSH_ENABLED
          value: "true"
        - name: OPENCLAW_SSH_PORT
          value: "22"
        - name: OPENCLAW_CONFIG_PATH
          value: "/home/node/.openclaw/lea/openclaw.json"
        envFrom:
        - secretRef:
            name: openclaw-secrets
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
        - name: ssh
          mountPath: /home/node/.ssh
        - name: config
          mountPath: /home/node/.config
        - name: litellm-config
          mountPath: /home/node/litellm/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: openclaw-data
      - name: ssh
        persistentVolumeClaim:
          claimName: openclaw-ssh
      - name: config
        emptyDir: {}
      - name: litellm-config
        configMap:
          name: litellm-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: default
data:
  config.yaml: |
    model_list:
      - model_name: claude-sonnet
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-20250514-v1:0
          aws_region_name: us-west-2

      - model_name: claude-sonnet-46
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_region_name: us-west-2

      - model_name: claude-opus
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-5-20251101-v1:0
          aws_region_name: us-west-2

      - model_name: claude-opus-46
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-6-v1
          aws_region_name: us-west-2

      - model_name: claude-haiku
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
          aws_region_name: us-west-2

    litellm_settings:
      drop_params: true

    general_settings:
      master_key: sk-leo-litellm-key
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`openclaw.bapttf.com`)
    kind: Rule
    services:
    - name: openclaw
      port: 18789
  tls: {}
