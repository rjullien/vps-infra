apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate # Required if using ReadWriteOnce PVCs across node changes
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
        - name: openclaw
          image: ghcr.io/bapttf/openclaw-lea-config:sha-3693ebf74f97cee3fce5b92ae80c03f059b14a05
          resources:
            requests:
              cpu: "50m"
              memory: "512Mi"
            limits:
              cpu: "2000m"         
              memory: "1.5Gi"
          ports:
            - containerPort: 22
              name: ssh
          envFrom:
            - secretRef:
                name: openclaw-secret
          env:
            - name: OPENCLAW_SSH_ENABLED
              value: "true"
            - name: OPENCLAW_SSH_PORT
              value: "22"
            - name: OPENCLAW_CONFIG_PATH
              value: "/home/node/.openclaw/lea/openclaw.json"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1280 --max-semi-space-size=16"
          volumeMounts:
            - name: openclaw-home
              mountPath: /home
      securityContext:
        fsGroup: 1000
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home-pvc