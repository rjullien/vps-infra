# OpenCLAW and LiteLLM secrets from Infisical
# Configure in Infisical:
#   - project: openclaw
#   - environment: production
#   - secret path: /app
#   - keys: (all env variables from .env for openclaw)
#   - secret path: /litellm
#   - keys: aws-access-key-id, aws-secret-access-key, master-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: openclaw-secrets
  namespace: default
spec:
  hostAPI: https://infisical.bapttf.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectId: REPLACE_WITH_OPENCLAW_PROJECT_ID
        envSlug: production
        secretsPath: /app
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: openclaw-secrets
      secretNamespace: default
      creationPolicy: Owner
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: litellm-secrets
  namespace: default
spec:
  hostAPI: https://infisical.bapttf.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectId: REPLACE_WITH_OPENCLAW_PROJECT_ID
        envSlug: production
        secretsPath: /litellm
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: litellm-secrets
      secretNamespace: default
      creationPolicy: Owner
