# OpenCLAW and LiteLLM secrets from Infisical
# Configure in Infisical:
#   - project: openclaw
#   - environment: production
#   - secret path: /app
#   - keys: (all env variables from .env for openclaw)
#   - secret path: /litellm
#   - keys: aws-access-key-id, aws-secret-access-key, master-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: openclaw-secrets
  namespace: default
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_OPENCLAW_PROJECT_ID
  env: production
  secretPath: /app
  secretReloadPolicy: Always
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: litellm-secrets
  namespace: default
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_OPENCLAW_PROJECT_ID
  env: production
  secretPath: /litellm
  secretReloadPolicy: Always
