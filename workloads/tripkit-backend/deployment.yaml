apiVersion: apps/v1
kind: Deployment
metadata:
  name: tripkit-backend
  namespace: tripkit
  labels:
    app: tripkit-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripkit-backend
  template:
    metadata:
      labels:
        app: tripkit-backend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: backend
          image: ghcr.io/rjullien/tripkit-backend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: DB_DRIVER
              value: postgres
            - name: DB_HOST
              value: postgres-cluster-rw.cnpg-system.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: tripkit
            - name: DB_USER
              value: tripkit
            - name: DB_SSLMODE
              value: disable
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tripkit-db-password
                  key: password
            - name: BASE_PATH
              value: "/api"
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 2
            periodSeconds: 10
