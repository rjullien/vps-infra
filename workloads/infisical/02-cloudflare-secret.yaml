# Cloudflare credentials SealedSecret
# TO GENERATE: 
# 1. First deploy SealedSecrets controller via ArgoCD
# 2. Create a Cloudflare API Token with Zone:DNS:Edit permissions
# 3. Run:
#    kubectl create secret generic cloudflare-credentials \
#      -n cert-manager \
#      --from-literal=api-token='YOUR_CLOUDFLARE_API_TOKEN' \
#      -o yaml | kubeseal --format yaml > workloads/infisical/02-cloudflare-secret.yaml
# 4. Commit the sealed secret

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-credentials
  namespace: cert-manager
spec:
  encryptedData:
    api-token: REPLACE_WITH_SEALED_API_TOKEN
