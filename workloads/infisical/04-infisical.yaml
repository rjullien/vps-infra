# Infisical deployment
# Install via Helm:
# helm repo add infisical https://charts.infisical.com
# helm install infisical infisical/infisical -n infisical

# ServiceAccount for Infisical
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infisical
  namespace: infisical
---
# Service for Infisical
apiVersion: v1
kind: Service
metadata:
  name: infisical
  namespace: infisical
spec:
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    app.kubernetes.io/name: infisical
---
# IngressRoute for Infisical (HTTPS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: infisical
  namespace: infisical
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`infisical.bapttf.com`)
    kind: Rule
    services:
    - name: infisical
      port: 80
  tls:
    certResolver: letsencrypt-prod
