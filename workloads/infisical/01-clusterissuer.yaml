# Cloudflare DNS-01 Challenge ClusterIssuer
# Uses SealedSecret for credentials (secret zero problem)
# After deploying SealedSecret, cert-manager will be able to issue certificates

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@bapttf.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        cloudflare:
          email: admin@bapttf.com
          apiTokenSecretRef:
            name: cloudflare-credentials
            key: api-token
