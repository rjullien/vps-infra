# CloudNativePG PostgreSQL cluster for Infisical
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: infisical-db
  namespace: infisical
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  
  storage:
    storageClassName: local-path
    size: 5Gi
  
  bootstrap:
    initdb:
      database: infisical
      owner: infisical
      secret:
        name: infisical-db-credentials
  
  configuration:
    sharedBuffers: 128MB
    maxConnections: 100
    effectiveCacheSize: 512MB
    maintenanceWorkMem: 64MB
    checkpointCompletionTarget: 0.9
    walBuffers: 16MB
    defaultStatisticsTarget: 100
    randomPageCost: 1.1
    effectiveIoConcurrency: 200
    workMem: 4MB
    minWalSize: 80MB
    maxWalSize: 1GB
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  backup:
    retentionPolicy: "7d"
