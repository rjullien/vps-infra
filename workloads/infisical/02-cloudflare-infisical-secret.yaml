# Cloudflare credentials from Infisical
# Configure in Infisical:
#   - project: infrastructure
#   - environment: production
#   - secret path: /cloudflare
#   - keys: api-token

apiVersion: external.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: cloudflare-credentials
  namespace: cert-manager
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_INFRASTRUCTURE_PROJECT_ID
  env: production
  secretPath: /cloudflare
  secretReloadPolicy: Always
