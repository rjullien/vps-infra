# Garage credentials from Infisical
# Configure in Infisical:
#   - project: infrastructure
#   - environment: production
#   - secret path: /garage
#   - keys: rpc-secret, admin-token, metrics-token

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: garage-credentials
  namespace: default
spec:
  hostAPI: https://infisical.bapttf.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectId: REPLACE_WITH_INFRASTRUCTURE_PROJECT_ID
        envSlug: production
        secretsPath: /garage
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: garage-credentials
      secretNamespace: default
      creationPolicy: Owner
