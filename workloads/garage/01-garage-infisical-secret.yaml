# Garage credentials from Infisical
# Configure in Infisical:
#   - project: infrastructure
#   - environment: production
#   - secret path: /garage
#   - keys: rpc-secret, admin-token, metrics-token

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: garage-credentials
  namespace: default
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_INFRASTRUCTURE_PROJECT_ID
  env: production
  secretPath: /garage
  secretReloadPolicy: Always
