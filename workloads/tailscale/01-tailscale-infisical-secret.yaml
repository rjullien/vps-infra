# Tailscale OAuth credentials from Infisical
# Configure in Infisical after Infisical is deployed:
#   - project: infrastructure
#   - environment: production
#   - secret path: /tailscale
#   - keys: client-id, client-secret

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: tailscale-credentials
  namespace: tailscale
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_INFRASTRUCTURE_PROJECT_ID
  env: production
  secretPath: /tailscale
  secretReloadPolicy: Always
