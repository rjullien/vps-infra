# Tailscale OAuth credentials from Infisical
# Configure in Infisical after Infisical is deployed:
#   - project: infrastructure
#   - environment: production
#   - secret path: /tailscale
#   - keys: client-id, client-secret

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: tailscale-credentials
  namespace: tailscale
spec:
  hostAPI: https://infisical.bapttf.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectId: REPLACE_WITH_INFRASTRUCTURE_PROJECT_ID
        envSlug: production
        secretsPath: /tailscale
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: tailscale-credentials
      secretNamespace: tailscale
      creationPolicy: Owner
