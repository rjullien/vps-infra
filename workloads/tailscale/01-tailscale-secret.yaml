# Tailscale OAuth credentials SealedSecret
# TO GENERATE: 
# 1. Create OAuth client in https://login.tailscale.com/admin/settings/oauth
# 2. Get client ID and secret
# 3. Run:
#    kubectl create secret generic tailscale-credentials \
#      -n tailscale \
#      --from-literal=client-id='YOUR_CLIENT_ID' \
#      --from-literal=client-secret='YOUR_CLIENT_SECRET' \
#      -o yaml | kubeseal --format yaml > workloads/tailscale/01-tailcale-secret.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: tailscale-credentials
  namespace: tailscale
spec:
  encryptedData:
    client-id: REPLACE_WITH_SEALED_CLIENT_ID
    client-secret: REPLACE_WITH_SEALED_CLIENT_SECRET
