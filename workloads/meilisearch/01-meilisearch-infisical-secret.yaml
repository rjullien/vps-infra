# Meilisearch secrets from Infisical
# Configure in Infisical:
#   - project: infrastructure
#   - environment: production
#   - secret path: /meilisearch
#   - keys: master-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: meilisearch-secrets
  namespace: default
spec:
  hostAPI: https://infisical.bapttf.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectId: REPLACE_WITH_INFRASTRUCTURE_PROJECT_ID
        envSlug: production
        secretsPath: /meilisearch
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: meilisearch-secrets
      secretNamespace: default
      creationPolicy: Owner
