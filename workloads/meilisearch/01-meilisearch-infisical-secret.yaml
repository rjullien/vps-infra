# Meilisearch secrets from Infisical
# Configure in Infisical:
#   - project: infrastructure
#   - environment: production
#   - secret path: /meilisearch
#   - keys: master-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: meilisearch-secrets
  namespace: default
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_INFRASTRUCTURE_PROJECT_ID
  env: production
  secretPath: /meilisearch
  secretReloadPolicy: Always
