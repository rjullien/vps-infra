# InfisicalSecret - will sync secrets from Infisical
# Configure these values after setting up Infisical:
# - host: your Infisical URL
# - projectId: from Infisical dashboard
# - secretPath: path where secrets are stored in Infisical
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: couchdb-secrets
  namespace: default
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_PROJECT_ID
  env: production
  secretPath: /couchdb
  # Optional: reload deployment when secrets change
  secretReloadPolicy: Always
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: couchdb-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: couchdb-etc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchdb
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      containers:
      - name: couchdb
        image: couchdb:3.3.3
        ports:
        - containerPort: 5984
          name: couch
        envFrom:
        - secretRef:
            name: couchdb-secrets
        volumeMounts:
        - name: data
          mountPath: /opt/couchdb/data
        - name: etc
          mountPath: /opt/couchdb/etc/local.d
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: couchdb-data
      - name: etc
        persistentVolumeClaim:
          claimName: couchdb-etc
---
apiVersion: v1
kind: Service
metadata:
  name: couchdb
  namespace: default
spec:
  ports:
  - name: couch
    port: 5984
    targetPort: 5984
  selector:
    app: couchdb
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: obsidian-livesync
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`obsidian-livesync.bapttf.com`)
    kind: Rule
    services:
    - name: couchdb
      port: 5984
  tls: {}
