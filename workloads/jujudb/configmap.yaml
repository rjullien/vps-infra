apiVersion: v1
kind: ConfigMap
metadata:
  name: jujudb-config
  namespace: jujudb
data:
  # Configuration base de données
  DB_HOST: "postgres" # À adapter avec le FQDN Kubernetes si dans un autre namespace
  DB_PORT: "5432"
  DB_USER: "jujudb"
  DB_NAME: "jujudb"
  
  # Configuration recherche
  MEILI_HOST: "http://meilisearch:7700" # À adapter également si nécessaire
  
  # Configuration application
  PORT: "8080"
  LOG_FORMAT: "json"
  TEST_MODE: "false"
  PRODUCTION: "true"