# JujuDB secrets from Infisical
# Configure in Infisical:
#   - project: jujudb
#   - environment: production
#   - secret path: /app
#   - keys: db-user, db-password, app-password, session-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: jujudb-secrets
  namespace: default
spec:
  host: https://infisical.bapttf.com
  projectId: REPLACE_WITH_JUDJDB_PROJECT_ID
  env: production
  secretPath: /app
  secretReloadPolicy: Always
