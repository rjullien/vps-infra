# JujuDB secrets from Infisical
# Configure in Infisical:
#   - project: jujudb
#   - environment: production
#   - secret path: /app
#   - keys: db-user, db-password, app-password, session-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: jujudb-secrets
  namespace: default
spec:
  hostAPI: https://infisical.bapttf.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectId: REPLACE_WITH_JUDJDB_PROJECT_ID
        envSlug: production
        secretsPath: /app
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: jujudb-secrets
      secretNamespace: default
      creationPolicy: Owner
