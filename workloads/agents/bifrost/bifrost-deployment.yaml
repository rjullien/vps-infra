apiVersion: apps/v1
kind: Deployment
metadata:
  name: bifrost
  labels:
    app: bifrost  
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bifrost
  template:
    metadata:
      labels:
        app: bifrost
    spec:
      containers:
        - name: bifrost
          image: maximhq/bifrost:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          env:
            - name: APP_DIR
              value: "/app/data"
            - name: APP_PORT
              value: "8080"
            - name: APP_HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_STYLE
              value: "json"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3 
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: bifrost-secret
          volumeMounts:
            - name: config-volume
              mountPath: /app/data/config.json
              subPath: config.json
      volumes:
        - name: config-volume
          configMap:
            name: bifrost-config
