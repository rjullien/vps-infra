apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: nullclaw-infisical-secret
  namespace: openclaw
  annotations:
    argocd.argoproj.io/sync-wave: "-1" 
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: infrastructure # Adjust if OpenClaw is in a different project
        envSlug: prod
        secretsPath: /agents/nullclaw
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: nullclaw-secret # This is the secret your Deployment will use
      secretNamespace: openclaw
      secretType: Opaque
      creationPolicy: Owner