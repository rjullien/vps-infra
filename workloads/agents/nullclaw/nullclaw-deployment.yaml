apiVersion: apps/v1
kind: Deployment
metadata:
  name: nullclaw
  namespace: default
  labels:
    app: nullclaw
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nullclaw
  template:
    metadata:
      labels:
        app: nullclaw
    spec:
      containers:
        - name: nullclaw
          image: ghcr.io/nullclaw/nullclaw:latest
          args: ["gateway"]
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-secrets
                  key: telegram-bot-token
          volumeMounts:
            - name: config
              mountPath: /nullclaw-data/config.json
              subPath: config.json
              readOnly: true
            - name: data
              mountPath: /nullclaw-data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config
          secret:
            secretName: nullclaw-secret
            items:
              - key: NULLCLAW_CONFIG
                path: config.json
        - name: data
          persistentVolumeClaim:
            claimName: nullclaw-data
