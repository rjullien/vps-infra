apiVersion: apps/v1
kind: Deployment
metadata:
  name: nullclaw
  namespace: openclaw
  labels:
    app: nullclaw
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nullclaw
  template:
    metadata:
      labels:
        app: nullclaw
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              sed -e 's/\${TELEGRAM_BOT_TOKEN}/'"$TELEGRAM_BOT_TOKEN"'/g' -e 's/\${DISCORD_BOT_TOKEN}/'"$DISCORD_BOT_TOKEN"'/g' /config-template/config.json > /config/config.json
              mkdir -p /nullclaw-data/.ssh
              cp /ssh-in/config /nullclaw-data/.ssh/config
              cp /ssh-in/key /nullclaw-data/.ssh/id_ed25519_lou
              chown -R 65534:65534 /nullclaw-data/.ssh
              chmod 600 /nullclaw-data/.ssh/id_ed25519_lou
              chmod 644 /nullclaw-data/.ssh/config
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-secret
                  key: DISCORD_BOT_TOKEN
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /config
            - name: ssh-config
              mountPath: /ssh-in/config
              subPath: config
              readOnly: true
            - name: ssh-key
              mountPath: /ssh-in/key
              subPath: id_ed25519_lou
              readOnly: true
            - name: data
              mountPath: /nullclaw-data
      containers:
        - name: nullclaw
          image: ghcr.io/bapttf/nullclaw-lou-config/nullclaw-custom:main-b321c93
          args: ["gateway"]
          env:
            - name: JINA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nullclaw-secret
                  key: JINA_API_KEY
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-secret
                  key: GH_TOKEN
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /nullclaw-data/config.json
              subPath: config.json
              readOnly: true
            - name: data
              mountPath: /nullclaw-data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config-template
          configMap:
            name: nullclaw-config
        - name: config
          emptyDir: {}
        - name: ssh-config
          configMap:
            name: lou-ssh-config
        - name: ssh-key
          secret:
            secretName: nullclaw-secret
        - name: data
          persistentVolumeClaim:
            claimName: nullclaw-data
