apiVersion: apps/v1
kind: Deployment
metadata:
  name: nullclaw
  namespace: openclaw
  labels:
    app: nullclaw
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nullclaw
  template:
    metadata:
      labels:
        app: nullclaw
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - sed 's/\${TELEGRAM_BOT_TOKEN}/'"$TELEGRAM_BOT_TOKEN"'/g' /config-template/config.json > /config/config.json
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-secret
                  key: TELEGRAM_BOT_TOKEN
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /config
      containers:
        - name: nullclaw
          image: ghcr.io/nullclaw/nullclaw:latest
          args: ["gateway"]
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /nullclaw-data/config.json
              subPath: config.json
              readOnly: true
            - name: data
              mountPath: /nullclaw-data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config-template
          configMap:
            name: nullclaw-config
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: nullclaw-data
