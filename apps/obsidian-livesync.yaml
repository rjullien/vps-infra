apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: obsidian-livesync-workload
  namespace: argocd
  annotations:
      argocd.argoproj.io/manifest-generate-paths: .
spec:
  project: default
  source:
    repoURL: 'https://github.com/BaptTF/vps-infra.git'
    targetRevision: HEAD
    path: workloads/obsidian-livesync
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: couchdb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
