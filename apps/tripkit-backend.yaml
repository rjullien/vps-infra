apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tripkit-backend
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
spec:
  project: default
  source:
    repoURL: 'https://github.com/BaptTF/vps-infra.git'
    targetRevision: HEAD
    path: workloads/tripkit-backend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: tripkit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
