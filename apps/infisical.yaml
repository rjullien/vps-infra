apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical-system
  namespace: argocd
spec:
  project: system
  source:
    repoURL: 'https://github.com/BaptTF/vps-infra.git'
    targetRevision: HEAD
    path: system/infisical
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: infisical
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
