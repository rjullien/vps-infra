apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - infisical-secrets.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    releaseName: prometheus
    version: 56.2.0 # Always pin versions in production!
    valuesFile: values/kube-prometheus-stack.yaml
    namespace: monitoring

  - name: loki-stack
    repo: https://grafana.github.io/helm-charts
    releaseName: loki
    version: 2.10.2
    valuesFile: values/loki-stack.yaml
    namespace: monitoring

  - name: tempo
    repo: https://grafana.github.io/helm-charts
    releaseName: tempo
    version: 1.8.0
    valuesFile: values/tempo.yaml
    namespace: monitoring