# Loki - log aggregation in SingleBinary mode (lightweight, no object storage needed)

deploymentMode: SingleBinary

# SingleBinary replicas (1 is enough for a single node)
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 256Mi
  persistence:
    enabled: true
    size: 10Gi

# Disable SimpleScalable components (we use SingleBinary)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable caches (memcached) -- not needed for single-binary mode
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Loki configuration
loki:
  auth_enabled: false

  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1

  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    max_cache_freshness_per_query: 10m
    split_queries_by_interval: 15m
    volume_enabled: true
    retention_period: 720h  # 30 days

  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: filesystem

# Gateway (nginx) -- needed for promtail to push logs
gateway:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 32Mi

# Disable monitoring sub-components (we already have VM for that)
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# Disable canary (DaemonSet that tests log ingestion -- not needed)
lokiCanary:
  enabled: false

# Disable test
test:
  enabled: false
