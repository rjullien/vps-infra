# Traefik values for k3s
# https://github.com/traefik/traefik-helm-chart

# Namespace
namespace: traefik

# Service configuration
service:
  spec:
    type: LoadBalancer

# EntryPoints configuration
ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443

# Enable OpenTelemetry tracing
tracing:
  otlp:
    grpc:
      enabled: true
      endpoint: "otel-collector.monitoring.svc:4317"
    http:
      enabled: false

# Providers configuration
# Instructs Traefik to publish its LoadBalancer IP to standard Ingress resources.
# This ensures tools like ArgoCD can accurately read the Ingress health status.
providers:
  kubernetesIngress:
    publishedService:
      enabled: true

# IngressClass configuration
ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

# Enable dashboard
dashboard:
  enabled: true
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - traefik.bapttf.com
    tls: []

# Logs configuration
logs:
  general:
    level: INFO
  access:
    enabled: true

# Metrics configuration
metrics:
  prometheus:
    enabled: true
    entryPoint: metrics

# Security
security:
  podsAntiAffinity: true

# Resource limits
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"