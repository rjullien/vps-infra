# Cloudflare credentials from Infisical
# Configure in Infisical:
#   - project: infrastructure
#   - environment: production
#   - secret path: /cloudflare
#   - keys: api-token

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: cloudflare-credentials
  namespace: cert-manager
spec:
  hostAPI: https://infisical.bapttf.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectId: REPLACE_WITH_INFRASTRUCTURE_PROJECT_ID
        envSlug: production
        secretsPath: /cloudflare
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: cloudflare-credentials
      secretNamespace: cert-manager
      creationPolicy: Owner
