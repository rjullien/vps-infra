# LLDAP-only secrets (jwt-secret)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: lldap-secrets-sync
  namespace: authelia
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: infrastructure
        envSlug: prod
        secretsPath: /lldap
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: lldap-secrets
      secretNamespace: authelia
      secretType: Opaque
      creationPolicy: Owner
---
# LDAP bind password — shared between LLDAP (admin pass) and Authelia (bind pass)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: lldap-auth-secrets-sync
  namespace: authelia
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: infrastructure
        envSlug: prod
        secretsPath: /lldap/auth
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: lldap-auth-secret
      secretNamespace: authelia
      secretType: Opaque
      creationPolicy: Owner
---
