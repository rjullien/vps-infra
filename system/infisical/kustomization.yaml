# workloads/infisical/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: infisical

helmCharts:
  - name: infisical-standalone
    repo: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts
    version: "*"
    releaseName: infisical
    namespace: infisical
    valuesFile: 07-infisical-helm-apps-values.yaml

resources:
  - 00-namespaces.yaml
  - 01-clusterissuer.yaml
  - 02-postgres-cluster.yaml
  - 03-db-credentials.yaml
  - 04-ingress.yaml
  - 05-redis.yaml
  - 06-infisical-secrets-sealed.yaml
