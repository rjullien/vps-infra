# CloudNativePG PostgreSQL cluster for Infisical
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: infisical-db
  namespace: infisical
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  
  storage:
    storageClass: local-path
    size: 5Gi
  
  bootstrap:
    initdb:
      database: infisical
      owner: infisical
      secret:
        name: infisical-db-credentials
  
  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_connections: "100"
      effective_cache_size: "512MB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "4MB"
      min_wal_size: "80MB"
      max_wal_size: "1GB"
  
  resources:
    # requests:
    #   memory: "256Mi"
    #   cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  backup:
    retentionPolicy: "7d"
